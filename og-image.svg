<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph card 1200x630. Per Play Store/Twitter va meglio PNG, quindi
     converti questo SVG con: rsvg-convert -w 1200 -h 630 og-image.svg > og-image.png
     (o usa online converter). SVG resta come master editabile. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#241F55"/>
      <stop offset="60%"  stop-color="#100E2A"/>
      <stop offset="100%" stop-color="#08071A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2DD4BF" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo NeuralMark large 280px su lato sinistro -->
  <g transform="translate(180,175) scale(4.67)">
    <circle cx="30" cy="30" r="29" fill="url(#glow)"/>
    <circle cx="48"    cy="30"    r="11.0" fill="url(#tealHalo)" opacity="0.55"/>
    <circle cx="39.00" cy="45.59" r="9.0"  fill="#F59E0B" opacity="0.22"/>
    <circle cx="21.00" cy="45.59" r="8.0"  fill="#A78BFA" opacity="0.17"/>
    <circle cx="12"    cy="30"    r="11.0" fill="url(#tealHalo)" opacity="0.55"/>
    <circle cx="21.00" cy="14.41" r="9.0"  fill="#F59E0B" opacity="0.22"/>
    <circle cx="39.00" cy="14.41" r="8.0"  fill="#A78BFA" opacity="0.17"/>
    <line x1="30" y1="30" x2="48"    y2="30"    stroke="#2DD4BF" stroke-width="0.85" opacity="0.58"/>
    <line x1="30" y1="30" x2="39.00" y2="45.59" stroke="#F59E0B" stroke-width="0.78" opacity="0.55"/>
    <line x1="30" y1="30" x2="21.00" y2="45.59" stroke="#A78BFA" stroke-width="0.72" opacity="0.38"/>
    <line x1="30" y1="30" x2="12"    y2="30"    stroke="#2DD4BF" stroke-width="0.85" opacity="0.58"/>
    <line x1="30" y1="30" x2="21.00" y2="14.41" stroke="#F59E0B" stroke-width="0.78" opacity="0.55"/>
    <line x1="30" y1="30" x2="39.00" y2="14.41" stroke="#A78BFA" stroke-width="0.72" opacity="0.38"/>
    <circle cx="48"    cy="30"    r="5.0" fill="#2DD4BF" opacity="0.95"/>
    <circle cx="39.00" cy="45.59" r="4.2" fill="#F59E0B" opacity="0.96"/>
    <circle cx="21.00" cy="45.59" r="3.5" fill="#A78BFA" opacity="0.78"/>
    <circle cx="12"    cy="30"    r="5.0" fill="#2DD4BF" opacity="0.95"/>
    <circle cx="21.00" cy="14.41" r="4.2" fill="#F59E0B" opacity="0.96"/>
    <circle cx="39.00" cy="14.41" r="3.5" fill="#A78BFA" opacity="0.78"/>
    <circle cx="30" cy="30" r="14"  fill="#8B5CF6" opacity="0.18"/>
    <circle cx="30" cy="30" r="6.5" fill="#8B5CF6" opacity="0.93"/>
    <circle cx="30" cy="30" r="3.2" fill="#C4B5FD" opacity="0.97"/>
  </g>

  <!-- Copy a destra -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, system-ui, sans-serif" fill="#F4F3FF">
    <text x="560" y="265" font-size="84" font-weight="800" letter-spacing="-2">Memura</text>
    <text x="560" y="345" font-size="38" font-weight="600" fill="#B8B3D8">Il tuo secondo cervello.</text>
    <text x="560" y="395" font-size="30" font-weight="500" fill="#2DD4BF">Privato. Sempre con te.</text>
    <text x="560" y="555" font-size="22" font-weight="500" fill="#9A95B8">memuraapp.it</text>
  </g>
</svg>
