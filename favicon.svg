<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- NeuralMark "small" — replica esatta di NeuralMark.tsx variant=small -->
  <!-- Background scuro coerente con app icon Android -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#241F55"/>
      <stop offset="100%" stop-color="#08071A"/>
    </radialGradient>
  </defs>
  <rect width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- Linee centro→satellite -->
  <line x1="30" y1="30" x2="48"    y2="30"    stroke="#2DD4BF" stroke-width="0.75" opacity="0.55"/>
  <line x1="30" y1="30" x2="39.00" y2="45.59" stroke="#F59E0B" stroke-width="0.70" opacity="0.50"/>
  <line x1="30" y1="30" x2="21.00" y2="45.59" stroke="#A78BFA" stroke-width="0.65" opacity="0.32"/>
  <line x1="30" y1="30" x2="12"    y2="30"    stroke="#2DD4BF" stroke-width="0.75" opacity="0.55"/>
  <line x1="30" y1="30" x2="21.00" y2="14.41" stroke="#F59E0B" stroke-width="0.70" opacity="0.50"/>
  <line x1="30" y1="30" x2="39.00" y2="14.41" stroke="#A78BFA" stroke-width="0.65" opacity="0.32"/>

  <!-- Nodi -->
  <circle cx="48"    cy="30"    r="5.0" fill="#2DD4BF" opacity="0.92"/>
  <circle cx="39.00" cy="45.59" r="4.2" fill="#F59E0B" opacity="0.95"/>
  <circle cx="21.00" cy="45.59" r="3.5" fill="#A78BFA" opacity="0.78"/>
  <circle cx="12"    cy="30"    r="5.0" fill="#2DD4BF" opacity="0.92"/>
  <circle cx="21.00" cy="14.41" r="4.2" fill="#F59E0B" opacity="0.95"/>
  <circle cx="39.00" cy="14.41" r="3.5" fill="#A78BFA" opacity="0.78"/>

  <!-- Centro -->
  <circle cx="30" cy="30" r="6.5" fill="#8B5CF6" opacity="0.90"/>
  <circle cx="30" cy="30" r="3.2" fill="#C4B5FD" opacity="0.95"/>
</svg>
